name: Hello Composite Action
description: My first composite action
inputs:
  name:
    description: 'Some name'
    required: true
    default: 'World'
outputs:
  random-number:
    description: 'Random number'
    value: '${{World}}'
runs:
  using: composite
  steps:
    - name: Says greeting
      run: echo "Hello ${{ inputs.INPUT_WHO_TO_GREET }}""
      shell: bash
      env:
        INPUT_WHO_TO_GREET: ${{ inputs.name }}

    - name: Random Generator
      id: random-number-generator
      run: echo "random_number=${echo $RANDOM}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Set Github Path
      run: echo "$GITHUB_ACTION_PATH" >> $GITHUB_PATH
      shell: bash
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}

    - name: Run goodbye.sh
      run: goodbye.sh
      shell: bash
